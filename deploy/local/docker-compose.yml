# HRMS — local (offline) installation
#
# Same codebase as cloud, single-tenant mode.
# Runs on a laptop / on-prem server. Syncs with cloud when online.
#
# Backend: Spring Boot JAR built from ../../../HRM System API.
#
# Start:   docker compose --env-file ./.env up -d --build
# Stop:    docker compose down

name: hrms-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../../HRM System API
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DEPLOYMENT_MODE: local
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hrms}
      DATABASE_USER: ${POSTGRES_USER:-hrms}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-hrms}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      LOCAL_TENANT_SLUG: ${LOCAL_TENANT_SLUG:-local-site}
      LOCAL_TENANT_NAME: ${LOCAL_TENANT_NAME:-Local Branch}
      LOCAL_API_KEY: ${LOCAL_API_KEY:-}
      CORS_ORIGINS: http://localhost:8080
    expose:
      - "4000"

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  # Edge proxy — plain HTTP on localhost, no TLS. Routes /api → backend, rest → SPA.
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${LOCAL_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db-data:
