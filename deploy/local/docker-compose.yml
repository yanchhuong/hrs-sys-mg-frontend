# HRMS — local (offline) installation
#
# Same codebase as cloud, single-tenant mode.
# Runs on a laptop / on-prem server. Syncs with cloud when online.
#
# Start:   docker compose --env-file ./.env up -d --build
# Seed:    docker compose exec backend npm run prisma:seed
# Stop:    docker compose down

name: hrms-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms}:${POSTGRES_PASSWORD:-hrms}@db:5432/${POSTGRES_DB:-hrms}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      DEPLOYMENT_MODE: local
      LOCAL_TENANT_SLUG: ${LOCAL_TENANT_SLUG:-local-site}
      LOCAL_TENANT_NAME: ${LOCAL_TENANT_NAME:-Local Branch}
      LOCAL_API_KEY: ${LOCAL_API_KEY}
      CORS_ORIGINS: http://localhost:8080
    expose:
      - "4000"

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  # Edge proxy — plain HTTP on localhost, no TLS. Routes /api → backend, rest → SPA.
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${LOCAL_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  # Sync worker — pushes local changes to the cloud, pulls remote changes.
  # Commented out by default until CLOUD_API_URL is configured.
  sync:
    build:
      context: ../../backend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms}:${POSTGRES_PASSWORD:-hrms}@db:5432/${POSTGRES_DB:-hrms}
      CLOUD_API_URL: ${CLOUD_API_URL:-}
      CLOUD_API_KEY: ${CLOUD_API_KEY:-}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-60}
    # Replace the default CMD with the sync-worker entrypoint once implemented.
    # For now the container exits so the worker stays paused until you wire it.
    command: ["node", "-e", "console.log('Sync worker placeholder — configure CLOUD_API_URL and implement src/sync-worker.ts'); setInterval(() => {}, 1 << 30)"]
    profiles:
      - sync

volumes:
  db-data:
