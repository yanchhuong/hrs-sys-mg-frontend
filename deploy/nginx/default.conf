server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively; Vite emits hashed filenames so this is safe.
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — never cache the HTML shell so deploys take effect instantly.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
}
