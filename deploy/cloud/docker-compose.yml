# HRMS — cloud deployment
#
# Services:
#   caddy     — TLS terminator + reverse proxy (auto HTTPS via Let's Encrypt)
#   frontend  — nginx serving the Vite build
#   backend   — Node/Express + Prisma
#   db        — Postgres 16
#
# Start:   docker compose --env-file ./.env up -d --build
# Seed:    docker compose exec backend npx prisma migrate deploy && docker compose exec backend npm run prisma:seed
# Logs:    docker compose logs -f backend

name: hrms-cloud

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hrms}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      DEPLOYMENT_MODE: cloud
      CORS_ORIGINS: ${PUBLIC_ORIGIN:?set PUBLIC_ORIGIN in .env}
    expose:
      - "4000"

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?set PUBLIC_HOST in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env for TLS cert registration}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  db-data:
  caddy-data:
  caddy-config:
